services:
  vaidikai-portal:
    build: .
    ports:
      - "4005:8000"
    env_file:
      - .env
    environment:
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - .:/app
      - /tmp/vaidikai:/tmp/vaidikai
      - ./upload_log.json:/app/upload_log.json
      - /opt/vaidikai-data/whisper_models:/app/models
      - /opt/vaidikai-data/hf_cache:/root/.cache/huggingface
    restart: always
    depends_on:
      labelstudio:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vaidikai-network

  labelstudio:
    image: heartexlabs/label-studio:1.13.1
    ports:
      - "4006:8080"
    volumes:
      - /opt/vaidikai-data/labelstudio:/label-studio/data
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_HOST=https://annotate.vaidik.ai
      - CSRF_TRUSTED_ORIGINS=https://annotate.vaidik.ai,http://annotate.vaidik.ai
    restart: always
    networks:
      - vaidikai-network

  sam-ml-backend:
    container_name: sam-ml-backend
    build:
      context: .
      dockerfile: Dockerfile.sam
    environment:
      - SAM_CHOICE=MobileSAM
      - LOG_LEVEL=DEBUG
      - WORKERS=1
      - THREADS=4
      - MODEL_DIR=/data/models
      - LABEL_STUDIO_HOST=http://labelstudio:8080
      - LABEL_STUDIO_ACCESS_TOKEN=${LABEL_STUDIO_API_KEY}
    ports:
      - "4007:9090"
    volumes:
      - /opt/vaidikai-data/labelstudio/sam_models:/data
    restart: always
    networks:
      - vaidikai-network

  postgres:
    image: postgres:15.6-alpine
    container_name: vaidikai-postgres
    restart: unless-stopped
    ports:
      - "4020:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vaidikai-network

networks:
  vaidikai-network:
    driver: bridge

volumes:
  postgres_data:
