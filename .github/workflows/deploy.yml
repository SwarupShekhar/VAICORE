name: Deploy to Vultr

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VULTR_SSH_PRIVATE_KEY }}" > ~/.ssh/vultr
          chmod 600 ~/.ssh/vultr
          ssh-keyscan -H ${{ secrets.VULTR_IP }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/vultr -o StrictHostKeyChecking=no deploy@${{ secrets.VULTR_IP }} << 'EOF'
            set -e

            REPO_URL="https://github.com/SwarupShekhar/VAICORE.git"
            DEPLOY_DIR="/opt/vaidikai-portal/vaidikai-portal"

            # ── Clone on first run, pull on subsequent runs ──────────────
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "📥 First deploy — cloning repository..."
              git clone "$REPO_URL" "$DEPLOY_DIR"
            else
              echo "📦 Pulling latest code..."
              cd "$DEPLOY_DIR"
              # Untrack runtime-generated data files so they never block a pull
              git rm -r --cached labelstudio-data/ 2>/dev/null || true
              # Remove untracked runtime files (untracked files block merge, checkout does NOT remove them)
              git clean -fd -- labelstudio-data/ 2>/dev/null || true
              git pull origin main
            fi

            cd "$DEPLOY_DIR"

            # ── Ensure .env exists ───────────────────────────────────────
            if [ ! -f .env ]; then
              echo "⚠️  WARNING: .env file not found!"
              echo "   Please create it manually: nano $DEPLOY_DIR/.env"
              exit 1
            fi

            # ── Detect docker compose command ────────────────────────────
            if command -v docker-compose &>/dev/null; then
              DC="docker-compose"
            else
              DC="docker compose"
            fi
            echo "🐳 Using: $DC"

            echo "🛑 Stopping old containers..."
            $DC down || true

            echo "🔨 Building new images..."
            $DC build --no-cache

            echo "🚀 Starting services..."
            $DC up -d

            echo "⏳ Waiting for services to become ready..."

            # ── Helper: wait_for_service <url> <label> <max_attempts> <sleep_interval> ──
            wait_for_service() {
              local url="$1"
              local label="$2"
              local max_attempts="$3"
              local interval="$4"
              local attempt=1
              while [ $attempt -le $max_attempts ]; do
                if curl -sf "$url" > /dev/null 2>&1; then
                  echo "✅ $label is healthy (attempt $attempt/$max_attempts)"
                  return 0
                fi
                echo "  ⌛ Waiting for $label... (attempt $attempt/$max_attempts)"
                sleep $interval
                attempt=$((attempt + 1))
              done
              echo "❌ $label failed to become healthy after $((max_attempts * interval))s"
              return 1
            }

            # ── Health checks ────────────────────────────────────────────
            ERRORS=0

            # Portal: up to 60s (12 attempts × 5s)
            if ! wait_for_service "http://localhost:4005/health" "Portal (port 4005)" 12 5; then
              $DC logs --tail=40 vaidikai-portal
              ERRORS=$((ERRORS+1))
            fi

            # Label Studio: up to 3 minutes (18 attempts × 10s) — needs DB migrations on fresh boot
            if ! wait_for_service "http://localhost:4006/health" "Label Studio (port 4006)" 18 10; then
              $DC logs --tail=40 labelstudio
              ERRORS=$((ERRORS+1))
            fi

            # SAM ML Backend: up to 60s (12 attempts × 5s)
            if ! wait_for_service "http://localhost:4007/health" "SAM ML Backend (port 4007)" 12 5; then
              $DC logs --tail=40 sam-ml-backend
              ERRORS=$((ERRORS+1))
            fi

            if [ $ERRORS -gt 0 ]; then
              echo ""
              echo "⚠️  $ERRORS service(s) failed health checks"
              exit 1
            fi

            echo ""
            echo "🎉 Deployment successful!"
            echo ""
            echo "Service URLs:"
            SERVER_IP=$(curl -s ifconfig.me)
            echo "  Portal:       http://$SERVER_IP:4005"
            echo "  Label Studio: http://$SERVER_IP:4006"
            echo "  SAM ML:       http://$SERVER_IP:4007"
          EOF

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Portal: http://${{ secrets.VULTR_IP }}:4005"
          echo "🏷️  Label Studio: http://${{ secrets.VULTR_IP }}:4006"
          echo "🤖 SAM ML: http://${{ secrets.VULTR_IP }}:4007"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check logs above."
          exit 1
